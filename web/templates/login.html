<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Калькулятор</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .link { margin-top: 20px; font-size: 14px; color: #666; }
        .link a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Вход</h2>
        <form method="POST">
            <input name="username" placeholder="Ваш логин" required>
            <input name="password" type="password" placeholder="Ваш пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div class="link">
            Нет аккаунта? <a href="/register">Создать профиль</a>
        </div>
    </div>
</body>
</html>
